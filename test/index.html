<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Web3 智能合約練習</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        input { padding: 10px; width: 200px; }
        .status { margin-top: 20px; padding: 10px; background: #f4f4f4; }
    </style>
</head>
<body>

<div class="container">
    <h1>Web3 合約互動測試</h1>
    <p>合約地址: <code>0x5e8932160fcD34C22C0d2dE426e5f89Ab5c53F21</code></p>
    
    <button onclick="connectWallet()">1. 連結錢包 (MetaMask)</button>
    <p id="walletAddress">錢包狀態：未連結</p>

    <hr>

    <h3>改變合約變數</h3>
    <input type="number" id="newValue" placeholder="輸入新的數字">
    <button onclick="setValue()">更新數值</button>

    <div class="status" id="status">狀態預覽：等待操作...</div>
</div>

<script>
    // 配置合約資訊
    const contractAddress = "0x5e8932160fcD34C22C0d2dE426e5f89Ab5c53F21";
    // 注意：這裡的 ABI 必須根據你實際部署的合約 function 調整，
    // 以下假設你的合約有 set(uint256) 功能
    const contractABI = [
        "function set(uint256 x) public",
        "function get() public view returns (uint256)"
    ];

    let provider, signer, contract;

    async function connectWallet() {
        if (typeof window.ethereum !== 'undefined') {
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            const address = await signer.getAddress();
            document.getElementById('walletAddress').innerText = "錢包狀態：已連結 " + address;
            contract = new ethers.Contract(contractAddress, contractABI, signer);
        } else {
            alert("請安裝 MetaMask！");
        }
    }

    async function setValue() {
        if (!contract) return alert("請先連結錢包");
        const val = document.getElementById('newValue').value;
        try {
            document.getElementById('status').innerText = "交易發送中...";
            const tx = await contract.set(val);
            await tx.wait();
            document.getElementById('status').innerText = "更新成功！交易 Hash: " + tx.hash;
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "交易出錯，請檢查 Console";
        }
    }
</script>

</body>
</html>
