<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Web3 合約互動測試 - 最終修復版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; line-height: 1.5; }
        .container { max-width: 550px; margin: auto; border-radius: 15px; background: white; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 1.5rem; color: #1c1e21; margin-bottom: 20px; border-left: 5px solid #007bff; padding-left: 15px; }
        .step-box { background: #f8f9fa; border: 1px solid #e9ecef; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: monospace; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 0.9rem; word-break: break-all; min-height: 20px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #interaction { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Web3 合約互動測試</h1>
    
    <div class="step-box">
        <strong>第一步：身分驗證</strong>
        <p style="font-size: 0.85rem; color: #666;">請貼上您的 MetaMask 錢包地址：</p>
        <input type="text" id="userAddrInput" placeholder="0x6aC...">
        <button onclick="verifyWallet()">連結並切換至 Sepolia</button>
        <div id="verifyStatus" class="status"></div>
    </div>

    <div id="interaction" class="step-box">
        <strong>第二步：寫入新訊息</strong>
        <p style="font-size: 0.85rem; color: #666;">輸入要儲存的文字或數字：</p>
        <input type="text" id="dataInput" placeholder="例如: Hello World">
        <button id="sendBtn" onclick="updateContract()" style="background: #28a745;">發送交易</button>
        <div id="txStatus" class="status"></div>
    </div>
</div>

<script>
    // 1. 設定新部署的 HelloWorld 合約地址
    const contractAddress = "0x06395CBD3d3B6ba4bc4225a9291F0A80e4985887"; 

    // 2. 設定正確的 ABI
    const abi = [
        "function updateMessage(string newMessage) public",
        "function message() public view returns (string)"
    ];

    let provider, signer, contract;

    async function verifyWallet() {
        const input = document.getElementById('userAddrInput').value.trim().toLowerCase();
        const status = document.getElementById('verifyStatus');
        
        if (!input || !input.startsWith('0x')) return alert("請輸入有效的錢包地址");
        if (!window.ethereum) return alert("未偵測到 MetaMask，請安裝擴充功能。");

        try {
            // 強制切換到 Sepolia 測試網
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0xaa36a7' }],
            });

            // 請求帳號授權
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const currentAcc = accounts[0].toLowerCase();

            if (input !== currentAcc) {
                status.className = "status error";
                status.innerText = "❌ 地址不匹配！請確保 MetaMask 選中的是該帳號。";
                return;
            }

            // 初始化 ethers 物件
            provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            contract = new ethers.Contract(contractAddress, abi, signer);

            status.className = "status success";
            status.innerText = "✅ 驗證成功！網路已設為 Sepolia。";
            document.getElementById('interaction').style.display = 'block';

        } catch (e) {
            status.className = "status error";
            status.innerText = "連線失敗: " + e.message;
        }
    }

    async function updateContract() {
        const val = document.getElementById('dataInput').value;
        const status = document.getElementById('txStatus');
        const btn = document.getElementById('sendBtn');

        if (!val) return alert("請輸入內容");

        try {
            btn.disabled = true;
            status.className = "status";
            status.innerText = "⏳ 正在等待 MetaMask 確認交易...";

            // 呼叫 updateMessage，並手動設定 GasLimit
            const tx = await contract.updateMessage(val.toString(), { 
                gasLimit: 120000 
            });
            
            status.className = "status";
            status.innerHTML = `🚀 交易已送出！等待區塊鏈打包...<br>Hash: <small>${tx.hash}</small>`;
            
            await tx.wait(); // 等待交易完成

            status.className = "status success";
            status.innerText = "🎉 成功！新訊息已儲存到區塊鏈。";
            document.getElementById('dataInput').value = "";

        } catch (e) {
            console.error(e);
            status.className = "status error";
            // 嘗試抓取更具體的錯誤原因
            status.innerText = "❌ 失敗：" + (e.data?.message || e.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
